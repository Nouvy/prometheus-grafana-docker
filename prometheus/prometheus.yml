global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

# Règles d'alertes
rule_files:
  - "rules/alerts.yml"

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:

  # Prometheus lui-même
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # cAdvisor — conteneurs Docker
  - job_name: "docker"
    static_configs:
      - targets: ["cadvisor:8080"]

  # Serveurs Linux / macOS (node_exporter :9100)
  - job_name: "linux"
    static_configs:
      - targets:
          - "192.168.1.10:9100"   # Exemple : SRV-LINUX-01
          # Ajouter d'autres hôtes ici
        labels:
          env: "production"
          os:  "linux"

  # Postes et serveurs Windows (windows_exporter :9182)
  - job_name: "windows"
    static_configs:
      - targets:
          - "192.168.1.20:9182"   # Exemple : PC-WIN01
          # Ajouter d'autres hôtes ici
        labels:
          env: "production"
          os:  "windows"

  # Équipements réseau via SNMP Exporter
  - job_name: "snmp"
    static_configs:
      - targets:
          - "192.168.1.1"   # Routeur
          - "192.168.1.2"   # Switch core
          # Ajouter d'autres équipements ici
    metrics_path: /snmp
    params:
      module: [if_mib]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

  # Sondes HTTP (disponibilité services web)
  - job_name: "blackbox_http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://192.168.1.10   # Exemple : site interne
          # Ajouter d'autres URLs ici
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Sondes TCP (vérifier un port ouvert)
  - job_name: "blackbox_tcp"
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - 192.168.1.10:443    # HTTPS
          - 192.168.1.10:3306   # MySQL
          # Ajouter d'autres cibles ici
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Sondes ICMP (ping)
  - job_name: "blackbox_icmp"
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 192.168.1.1   # Routeur
          - 192.168.1.2   # Switch
          # Ajouter d'autres hôtes ici
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
