version: '3.8'

networks:
  supervision:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

services:

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - supervision
    # Port non exposé — accessible uniquement via Grafana (http://prometheus:9090)
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - supervision
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  # ── Alertmanager ──────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    networks:
      - supervision
    # Port non exposé — accessible depuis Grafana (Connections > Alertmanager > http://alertmanager:9093)
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml

  # ── Blackbox Exporter (HTTP, TCP, ICMP, DNS) ──────────────────────────────────
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    networks:
      - supervision
    # Port non exposé — scrapé par Prometheus en interne
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml

  # ── SNMP Exporter (switches, routeurs) ────────────────────────────────────────
  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    restart: unless-stopped
    networks:
      - supervision
    # Port non exposé — scrapé par Prometheus en interne
    volumes:
      - ./snmp-exporter/snmp.yml:/etc/snmp_exporter/snmp.yml

  # ── Grafana Init — patch ${DS_PROMETHEUS} dans tous les dashboards ───────────
  grafana-init:
    image: python:3.12-alpine
    container_name: grafana-init
    restart: "no"
    networks:
      - supervision
    volumes:
      - ./scripts/patch_dashboards.py:/patch_dashboards.py:ro
    environment:
      - GRAFANA_URL=http://grafana:3000
      - GF_ADMIN_USER=admin
      - GF_ADMIN_PASSWORD=admin123
      - DS_UID=prometheus
    entrypoint: ["python3", "/patch_dashboards.py"]
    depends_on:
      - grafana

  # ── cAdvisor (conteneurs Docker) ──────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    networks:
      - supervision
    # Port non exposé — scrapé par Prometheus, visualisé dans Grafana (dashboard ID 193)
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
